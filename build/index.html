<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BomiTalkie 🐾</title><style>body{background-color:#2c3e50;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-family:Arial,sans-serif}.talkie-container{background:#34495e;padding:40px 30px;border-radius:40px;box-shadow:0 15px 50px rgba(0,0,0,.6);text-align:center;width:280px;border:4px solid #2c3e50}.title{color:#ecf0f1;margin-bottom:25px;font-size:1.5rem}.lcd-screen{background:#95a5a6;color:#2c3e50;padding:20px;border-radius:10px;margin-bottom:30px;min-height:60px;font-weight:700;border:4px inset #7f8c8d;line-height:1.4;display:flex;align-items:center;justify-content:center}.ptt-button{width:150px;height:150px;border-radius:50%;border:none;background:#e74c3c;color:#fff;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 10px #c0392b;transition:all .1s;outline:0;-webkit-tap-highlight-color:transparent}.ptt-button:active{box-shadow:0 4px #c0392b;transform:translateY(6px)}.guide-text{margin-top:25px;color:#bdc3c7;font-size:.9rem}</style><script defer="defer" src="/static/js/main.b8ca889f.js"></script></head><body><div class="talkie-container"><h1 class="title">PunguinTalkie 🐧</h1><div id="status" class="lcd-screen">마이크 권한을<br>확인 중입니다... 🐾</div><button id="talkBtn" class="ptt-button">PUSH TO<br>TALK</button><p class="guide-text">버튼을 꾹 누르고 말하세요!</p></div><script src="/socket.io/socket.io.js"></script><script>const socket=io(),statusDisplay=document.getElementById("status"),talkBtn=document.getElementById("talkBtn");let mediaRecorder,audioChunks=[];navigator.mediaDevices.getUserMedia({audio:!0}).then(e=>{mediaRecorder=new MediaRecorder(e),mediaRecorder.ondataavailable=e=>{audioChunks.push(e.data)},mediaRecorder.onstop=()=>{const e=new Blob(audioChunks,{type:"audio/ogg; codecs=opus"});socket.emit("voice-data",e),audioChunks=[]},statusDisplay.innerHTML="채널 접속 완료!<br>준비됐어 오빠! 🐾"}).catch(e=>{statusDisplay.innerHTML="마이크 권한을<br>허용해줘! 🙀",console.error("마이크 에러:",e)}),talkBtn.addEventListener("mousedown",()=>{mediaRecorder&&"inactive"===mediaRecorder.state&&(mediaRecorder.start(),statusDisplay.innerHTML="치익- 송신 중...<br>🎤🐈")}),talkBtn.addEventListener("mouseup",()=>{mediaRecorder&&"recording"===mediaRecorder.state&&(mediaRecorder.stop(),statusDisplay.innerHTML="송신 완료!<br>대기 중... 🐾")}),talkBtn.addEventListener("touchstart",e=>{e.preventDefault(),mediaRecorder&&"inactive"===mediaRecorder.state&&(mediaRecorder.start(),statusDisplay.innerHTML="치익- 송신 중...<br>🎤🐈")}),talkBtn.addEventListener("touchend",()=>{mediaRecorder&&"recording"===mediaRecorder.state&&(mediaRecorder.stop(),statusDisplay.innerHTML="송신 완료!<br>대기 중... 🐾")}),socket.on("voice-data",e=>{const t=new Blob([e],{type:"audio/ogg; codecs=opus"}),a=URL.createObjectURL(t),d=new Audio(a);d.play(),statusDisplay.innerHTML="메시지 수신 중!<br>📢🐾",d.onended=()=>{statusDisplay.innerHTML="채널 접속 완료!<br>대기 중... 🐾"}})</script></body></html>
